<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grace Mountain | Worship Rock</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0a0a0a;
            color: #eee;
            line-height: 1.6;
        }

        /* Main container for better centering */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('Hero.jpg') center/cover no-repeat;
            height: 100vh;
            min-height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        section {
            padding: 80px 0;
        }

        h2 {
            text-align: center;
            color: #c8102e;
            font-size: 2.4rem;
            margin-bottom: 40px;
        }

        .content-center {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .album-art {
            max-width: 320px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        .youtube-embed {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
            border-radius: 12px;
            margin: 0 auto;
        }
        .youtube-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .lyrics {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            font-size: 1.15rem;
            white-space: pre-wrap;
            max-width: 800px;
            margin: 0 auto;
        }

        .btn {
            display: inline-block;
            padding: 16px 36px;
            background: #c8102e;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="content-center">
                <img src="GMM_Logo_.png" alt="Grace Mountain Logo" style="max-height:90px; margin-bottom:20px;">
                <h1>Grace Mountain</h1>
                <p>Modern Worship Rock • Reimagining Classic Hymns</p>
                <a href="https://www.youtube.com/@Grace_Mountain" class="btn" target="_blank">Watch Latest Videos</a>
            </div>
        </div>
    </header>

    <section>
        <div class="container">
            <div class="content-center">
                <h2>Sovereign — Full Album Out Now</h2>
                <img src="AlbumCover_14x14.jpg" alt="Sovereign Album Cover" class="album-art">
            </div>
        </div>
    </section>

    <section style="background:#111;">
        <div class="container">
            <div class="content-center">
                <h2>Latest Video: Glory</h2>
                <div class="youtube-embed">
                    <iframe src="https://www.youtube.com/embed/5qKlaaBRC48" 
                            title="Glory - Grace Mountain" frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Grace Mountain • Cassville, Missouri</p>
        </div>
    </footer>

</body>
</html>
