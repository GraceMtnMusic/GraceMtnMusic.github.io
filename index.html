<!DOCTYPE html>
<html lang="en">
<head>

    <title>Grace Mountain | Worship Rock</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0a0a0a;
            color: #eee;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),

            height: 100vh;
            min-height: 650px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        section {
            padding: 80px 0;
        }
        h2 {
            text-align: center;
            color: #c8102e;
            font-size: 2.4rem;
            margin-bottom: 40px;
        }
        .content-center {
            max-width: 800px;
            margin: 0 auto;

        }
        .btn {

            padding: 16px 36px;
            background: #c8102e;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin: 10px;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 40px 0;
        }
        .links a {
            background: #222;
            padding: 16px 28px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
        }
        .youtube-embed {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
            border-radius: 12px;
            margin: 0 auto;
        }
        .youtube-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
